<div class="kvGrid" style="margin-top:8px;">
    <div class="kvRow"><span>Wi-Fi IP</span><span class="mono" id="wifiIp">—</span></div>
    <div class="kvRow"><span>Signal</span><span class="mono" id="wifiSignal">—</span></div>
    <div class="kvRow"><span>Access Point</span><span class="mono" id="wifiAp">—</span></div>
    <div class="kvRow"><span>Station</span><span class="mono" id="wifiStation">—</span></div>
</div>

<script>
    // qsp is substituted at build time by pio_pre_build_spa.py

    onSectionOpen('Status', function () {
        getJSON("/gs" + qsp[8],
            function (GS) {
                $(qsp + '#wifiAp').textContent = GS.apmode;
                $(qsp + '#wifiStation').textContent = GS.stationmode;

                if (GS.stationmode === 'on' && GS.rssi !== undefined) {
                    const ipSource = GS.stationipsource || '';
                    $(qsp + '#wifiIp').textContent = GS.stationip + (ipSource ? ' (' + ipSource + ')' : '');
                    const el = $(qsp + '#wifiSignal');
                    el.textContent = GS.rssi + ' dBm (' + Math.round(rssiToQuality(GS.rssi)) + '%)';
                    el.style.color = rssiToColor(GS.rssi);
                    WPC.setWifi({ rssi: GS.rssi, ip: GS.stationip, ipSource: ipSource, ap: GS.apmode, station: GS.stationmode, bssid: GS.bssid, mac: GS.mac });
                } else {
                    $(qsp + '#wifiIp').textContent = GS.apip ? (GS.apip + ' (AP)') : '—';
                    WPC.setWifi({ ap: GS.apmode, station: GS.stationmode, mac: GS.mac });
                }

                // if a client stays connected to the module's own Access Point while station mode
                // is also up, WiFi reconfiguration/reconnection can't proceed - warn the user
                if (GS.stationmode === 'on' && GS.apmode === 'on' && !$('#apWarningBanner')) {
                    const banner = document.createElement('div');
                    banner.id = 'apWarningBanner';
                    banner.className = 'apWarning';
                    banner.textContent = 'Disconnect devices from the Access Point Wi-Fi network to allow reconnection or Wi-Fi configuration changes.';
                    document.body.appendChild(banner);
                }
            },
            function () {
                $(qsp + '#wifiIp').textContent = 'Failed';
            }
        );
    });
</script>
