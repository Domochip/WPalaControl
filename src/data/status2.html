<div class="kvGrid" style="margin-top:8px;">
    <div class="kvRow"><span>Hardware</span><span class="mono" id="appHwVersion">—</span></div>
    <div class="kvRow"><span>Stove serial</span><span class="mono" id="appStoveSn" style="font-size:11.5px;">—</span></div>
</div>

<div class="hairlineTop">
    <div class="subhead">Counters</div>
    <div class="grid4" style="padding-top:0;">
        <div>
            <div class="statLabel">Ignitions</div>
            <div class="statValue" id="cntIgn">—</div>
        </div>
        <div>
            <div class="statLabel">Power time</div>
            <div class="statValue" id="cntPower">—</div>
        </div>
        <div>
            <div class="statLabel">Service</div>
            <div class="statValue" id="cntService">—</div>
        </div>
        <div>
            <div class="statLabel">On time</div>
            <div class="statValue" id="cntOn">—</div>
        </div>
    </div>
</div>

<button class="linkBtn" id="rawToggleBtn" style="margin-top:20px;">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" class="chev" id="rawChev">
        <path d="M6 9l6 6 6-6" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    Raw data
</button>
<div class="rawGrid" id="rawGrid" style="display:none;"></div>

<script>
    // qsp is substituted at build time by pio_pre_build_spa.py

    let raw = {};
    let rawOpen = false;

    function renderRawGrid() {
        const rows = Object.keys(raw).map(function (k) {
            return '<div class="rawRow"><span>' + k + '</span><span>' + raw[k] + '</span></div>';
        }).join('');
        $(qsp + '#rawGrid').innerHTML = rows;
    }

    function updateDerivedRows() {
        if (raw.IGN !== undefined) $(qsp + '#cntIgn').textContent = raw.IGN;
        if (raw.POWERTIME !== undefined) $(qsp + '#cntPower').textContent = raw.POWERTIME;
        if (raw.SERVICETIME !== undefined) $(qsp + '#cntService').textContent = raw.SERVICETIME;
        if (raw.ONTIME !== undefined) $(qsp + '#cntOn').textContent = raw.ONTIME;
        if (raw.SN !== undefined) $(qsp + '#appStoveSn').textContent = raw.SN;
    }

    function mergeRaw(partial) {
        Object.assign(raw, partial);
        WPC.updateRaw(partial);
        renderRawGrid();
        updateDerivedRows();
    }

    $(qsp + '#rawToggleBtn').addEventListener('click', function () {
        rawOpen = !rawOpen;
        $(qsp + '#rawGrid').style.display = rawOpen ? 'grid' : 'none';
        $(qsp + '#rawChev').classList.toggle('open', rawOpen);
    });

    onSectionOpen('Status', async function () {
        // Module/hardware + Home Automation connectivity info
        getJSON("/gs" + qsp[8], function (GS) {
            $(qsp + '#appHwVersion').textContent = GS.hwversion + (GS.hwdetection || '');
            WPC.setHaStatus({ protocol: GS.haprotocol, mqttStatus: GS.hamqttstatus });
        });

        if (!!window.EventSource && (typeof statusEventSource === 'undefined' || statusEventSource.readyState === 2)) {
            var statusEventSource = new EventSource('/statusEvt' + qsp[8]);
            statusEventSource.addEventListener('message', function (e) {
                mergeRaw(JSON.parse(e.data));
            });
        }

        // Seed the raw stove data instantly instead of waiting for the next periodic publish
        // (same command set publishTick() runs, so field names line up with the SSE updates above).
        // Sent one at a time (not Promise.all): the device is a single-threaded ESP8266 web
        // server with a very small TCP connection budget, so firing all 9 requests concurrently
        // can exhaust its sockets and cause failed/reset connections. Sequential requests keep
        // at most one extra connection open on top of the SSE stream.
        const cmds = ['SERN', 'STAT', 'TMPS', 'FAND', 'CNTR', 'TIME', 'SETP', 'POWR', 'DPRS'];
        for (const cmd of cmds) {
            try {
                const res = await fetch('/cgi-bin/sendmsg.lua?cmd=GET+' + cmd).then(function (r) { return r.json(); });
                if (res && res.SUCCESS && res.DATA) mergeRaw(res.DATA);
            } catch (e) {
                // ignore; the SSE stream above will backfill this field on its next tick
            }
        }
    });
</script>
